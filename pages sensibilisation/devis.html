<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demande de devis - ShadowCyber</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Roboto&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Roboto;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* BOITE PRINCIPALE */

.container{
width:450px;
background:rgba(0,0,0,0.92);
padding:40px;
border-radius:15px;
box-shadow:0 0 30px red;
border:2px solid #ff2b2b;
}

/* TITRE */

h1{
font-family:Orbitron;
text-align:center;
color:#ff2b2b;
text-shadow:0 0 10px red;
margin-bottom:30px;
}

/* INPUTS */

input, textarea, select{
width:100%;
padding:12px;
margin-bottom:20px;
border:none;
border-radius:8px;
background:#111;
color:white;
box-shadow:0 0 10px #d8c7c7 inset;
font-size:14px;
}

input:focus, textarea:focus, select:focus{
outline:none;
box-shadow:0 0 15px red inset;
}

/* BOUTON ENVOYER */

button{
width:100%;
padding:15px;
background:#ff2b2b;
border:none;
border-radius:8px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px red;
transition:0.3s;
}

button:hover{
background:#b53d3d;
box-shadow:0 0 25px red;
}

/* ZONE RETOUR (séparée) */

.return-zone{
text-align:center;
margin-top:25px;
padding-top:20px;
border-top:1px solid rgba(255,255,255,0.1);
}

/* BOUTON RETOUR */

.btn-retour{
display:inline-block;
padding:12px 25px;
background:#1a1a1a;
color:white;
text-decoration:none;
border-radius:8px;
border:1px solid #ff2b2b;
transition:0.3s;
}

.btn-retour:hover{
background:#ff2b2b;
box-shadow:0 0 15px red;
}

</style>
</head>

<body>

<div class="container">

<h1>Demande de devis</h1>

<form action="https://formsubmit.co/exploitshadow2025@protonmail.com" method="POST">
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="Nouveau devis ShadowCyber">

<input type="text" name="Nom" placeholder="Nom" required>

<input type="email" name="Email" placeholder="Email" required>

<input type="text" name="Entreprise" placeholder="Entreprise">

<select name="Service">
<option>INITIATION À LA CYBERSÉCURITÉ POUR PARTICULIERS</option>
<option>SENSIBILISATION À LA CYBERSÉCURITÉ POUR LES ENTREPRISES</option>
<option>FORMATION PROTECTION CONTRE L'ESPIONNAGE NUMÉRIQUE</option>
</select>

<textarea name="Message" rows="5" placeholder="Votre demande de devis" required></textarea>

<button type="submit">Envoyer la demande</button>

</form>

<!-- BOUTON RETOUR BIEN SÉPARÉ -->
<div class="return-zone">
<a href="index.html" class="btn-retour">Retour au site</a>
</div>

</div>

<script>
function redirectAfterSubmit(){
setTimeout(function(){
window.location.href="merci.html";
},100);
return true;
}
</script>

</body>
</html>
